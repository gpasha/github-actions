name: CI/CD Pipiline

on:
  push:
    branches: [master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependecies
        run: npm ci
      
      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Docker build
        run: docker build -t ${{ secrets.DOCKER_USER }}/devops-github-actions:${{ github.sha }} .

      - name: Docker login
        run: echo ${{ secrets.DOCKER_PASS }} | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin

      - name: Docker push
        run: docker push ${{ secrets.DOCKER_USER }}/devops-github-actions:${{ github.sha }}

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3


      - name: Deploy over SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SSH_HOST}}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo ${{ secrets.DOCKER_PASS }} | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin
            docker pull ${{ secrets.DOCKER_USER }}/devops-github-actions:${{ github.sha }}
            docker stop devops-gha-container || true
            docker rm devops-gha-container || true
            docker run -d -p 4545:4545 --name devops-gha-container ${{ secrets.DOCKER_USER }}/devops-github-actions:${{ github.sha }}


