name: CI Pipiline

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependecies
        run: npm ci
      
      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test
